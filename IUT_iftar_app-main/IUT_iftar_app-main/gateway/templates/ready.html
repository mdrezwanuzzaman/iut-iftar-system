<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Ready</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .ready-card {
            background: rgba(255,255,255,0.08); backdrop-filter: blur(20px);
            border-radius: 40px; padding: 60px; text-align: center;
            max-width: 600px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .success-icon { font-size: 120px; margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        h1 { color: white; font-size: 48px; margin-bottom: 20px; }
        .order-id {
            color: #00ff9f; font-size: 72px; font-weight: bold;
            text-shadow: 0 0 30px #00ff9f; animation: glow 2s infinite;
        }
        @keyframes glow {
            0% { text-shadow: 0 0 20px #00ff9f; }
            50% { text-shadow: 0 0 50px #00ff9f; }
        }
        .message {
            color: white; font-size: 28px; margin: 30px 0;
            background: rgba(0,255,159,0.1); padding: 20px; border-radius: 20px;
            border: 1px solid #00ff9f;
        }
        .counter-info {
            color: white; font-size: 20px; margin: 30px 0;
            padding: 20px; background: rgba(0,0,0,0.3); border-radius: 15px;
        }
        .counter-number { color: #00ff9f; font-size: 32px; font-weight: bold; }
        .action-buttons {
            display: flex; gap: 20px; justify-content: center; margin-top: 40px;
        }
        .btn {
            padding: 15px 40px; border: none; border-radius: 15px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            text-decoration: none; transition: 0.3s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00ff9f, #00c6ff); color: #111;
            box-shadow: 0 0 20px #00ff9f;
        }
        .btn-secondary {
            background: transparent; color: white; border: 2px solid rgba(255,255,255,0.3);
        }
        .btn-primary:hover { transform: translateY(-5px); box-shadow: 0 0 40px #00ff9f; }
        .btn-secondary:hover { border-color: #00ff9f; color: #00ff9f; transform: translateY(-5px); }
    </style>
</head>
<body>
    <div class="ready-card">
        <div class="success-icon">🎉</div>
        <h1>Order Ready!</h1>
        <div class="order-id" id="order-id">#1001</div>
        <div class="message">✅ Your meal is ready for pickup</div>
        <div class="counter-info">Please collect from: <div class="counter-number">Iftar Counter #2</div></div>
        <div class="action-buttons">
            <a href="/menu" class="btn btn-secondary">📋 Back to Menu</a>
            <a href="/" class="btn btn-primary">🏠 Home</a>
        </div>
    </div>
    <script>
        const orderId = window.location.pathname.split('/').pop();
        document.getElementById('order-id').textContent = '#' + orderId;
        setTimeout(() => window.location.href = '/menu', 30000);
    </script>
</body>
</html>
